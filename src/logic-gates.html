<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIE Logic Gates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/logic-gates.css">
</head>
<body>

<!-- TITLE BAR -->
<div id="titlebar">
  <a class="logo" href="../index.html">
    <!-- NOT gate icon: triangle + bubble -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 5 L17 12 L3 19 Z"/>
      <circle cx="20" cy="12" r="2.5"/>
    </svg>
    CIE Logic Gates
  </a>
  <div class="title-center">IGCSE Computer Science — Logic Gate Simulator</div>
  <div class="title-actions">
    <a class="title-btn" href="pseudocode.html" style="text-decoration:none">Pseudocode ↗</a>
    <a class="title-btn" href="flowcharts.html" style="text-decoration:none">Flowcharts ↗</a>
    <button class="title-btn" id="btn-export" title="Export circuit as PNG">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Export PNG
    </button>
    <button class="title-btn" id="btn-clear" title="Clear the canvas">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
      Clear
    </button>
    <!-- ⏾ = dark mode symbol; shows ☀ in light mode -->
    <button class="title-btn" id="btn-theme" title="Toggle light/dark mode">⏾</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="workspace">

    <!-- LEFT: Component Library -->
    <div id="left-sidebar">
      <div class="sidebar-header">Components</div>
      <div id="component-library"></div>
    </div>

    <!-- CENTER: Canvas + zoom controls pinned to wrapper bottom-right -->
    <div id="canvas-wrapper">
      <svg id="canvas" viewBox="0 0 3000 2000" width="3000" height="2000" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="grid-pat" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="var(--canvas-grid)" stroke-width="0.5"/>
          </pattern>
        </defs>
        <rect id="canvas-bg" width="3000" height="2000" fill="url(#grid-pat)"/>
        <g id="wires-layer"></g>
        <g id="comps-layer"></g>
        <path id="temp-wire" fill="none" visibility="hidden"/>
        <rect id="sel-rect" visibility="hidden" class="sel-rect-style"/>
      </svg>
      <!-- Zoom controls: sticky inside the scrollable canvas area -->
      <div id="zoom-controls">
        <button class="zoom-btn" id="btn-zoom-in"  title="Zoom in">+</button>
        <span   class="zoom-btn zoom-label" id="zoom-label">100%</span>
        <button class="zoom-btn" id="btn-zoom-out" title="Zoom out">−</button>
        <button class="zoom-btn" id="btn-zoom-fit" title="Fit to screen" style="font-size:13px;font-weight:700">=</button>
      </div>
    </div>

    <!-- RESIZER between canvas and truth table -->
    <div id="sidebar-resizer" title="Drag to resize truth table"></div>

    <!-- RIGHT: Truth Table -->
    <div id="right-sidebar">
      <div class="sidebar-header">Truth Table</div>
      <div id="truth-table-container">
        <div class="tt-hint">Place INPUT and OUTPUT components to generate the truth table automatically.</div>
      </div>
    </div>

  </div><!-- end #workspace -->

  <div id="expression-bar">
    <span class="expr-label">Expression</span>
    <div id="expression-wrap">
      <span id="expression-text">Add an OUTPUT component to see the Boolean expression</span>
      <button id="copy-expr-btn" title="Copy expression to clipboard">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      </button>
    </div>
    <a id="attr-link" href="https://github.com/its-idhem" target="_blank" rel="noopener">made by its-idhem</a>
  </div>
</div>

<!-- Shared floating tooltip (JS-positioned, never clipped) -->
<div id="global-tooltip"></div>

<script src="js/logic-gates.js"></script>
</body>
</html>
